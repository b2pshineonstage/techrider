<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Rider Generator — Shine on Stage</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --gold: #C9A227;
    --gold-light: #F5E9C4;
    --gold-dark: #a07d10;
    --black: #1A1A1A;
    --grey: #999999;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; padding: 24px 40px; border-bottom: 2px solid var(--gold); display: flex; align-items: center; gap: 16px; }
  header img { height: 48px; width: auto; }
  header .subtitle { font-size: 13px; color: var(--grey); letter-spacing: 0.05em; text-transform: uppercase; }
  main { width: 100%; max-width: 720px; padding: 56px 24px 80px; display: flex; flex-direction: column; gap: 40px; }
  .hero { text-align: center; }
  .hero h1 { font-size: 36px; font-weight: 700; color: var(--white); line-height: 1.15; margin-bottom: 12px; }
  .hero h1 span { color: var(--gold); }
  .hero p { font-size: 15px; color: #aaaaaa; line-height: 1.6; }
  .drop-zone { border: 2px dashed #3a3a3a; border-radius: 12px; padding: 56px 32px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: #111; position: relative; }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--gold); background: #1a1500; }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 40px; margin-bottom: 16px; display: block; }
  .drop-zone h2 { font-size: 18px; font-weight: 600; color: var(--white); margin-bottom: 8px; }
  .drop-zone p { font-size: 13px; color: var(--grey); }
  .drop-zone .formats { margin-top: 16px; display: flex; justify-content: center; gap: 8px; }
  .badge { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; padding: 4px 10px; border-radius: 4px; background: #222; color: var(--gold); border: 1px solid #333; text-transform: uppercase; }
  .file-loaded { background: #0d1a00; border: 2px solid #4a7c00; border-radius: 12px; padding: 20px 24px; display: flex; align-items: center; gap: 16px; }
  .file-loaded .file-icon { font-size: 28px; }
  .file-loaded .file-info { flex: 1; }
  .file-loaded .file-name { font-weight: 600; font-size: 15px; color: var(--white); }
  .file-loaded .file-meta { font-size: 13px; color: #888; margin-top: 2px; }
  .file-loaded .clear-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 20px; line-height: 1; padding: 4px; }
  .file-loaded .clear-btn:hover { color: #fff; }
  .preview-panel { background: #111; border: 1px solid #2a2a2a; border-radius: 12px; overflow: hidden; }
  .panel-header { padding: 16px 24px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-size: 13px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.06em; }
  .act-count { font-size: 13px; color: var(--grey); }
  .act-list { padding: 8px 0; max-height: 280px; overflow-y: auto; }
  .act-row { display: flex; align-items: center; gap: 12px; padding: 10px 24px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
  .act-row:last-child { border-bottom: none; }
  .act-num { width: 24px; text-align: center; font-weight: 700; color: var(--gold); font-size: 12px; flex-shrink: 0; }
  .act-school { color: var(--grey); width: 160px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .act-routine { color: var(--white); flex: 1; }
  .act-length { color: var(--grey); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .separator-row { display: flex; align-items: center; padding: 8px 24px; background: #1a1a00; font-size: 12px; font-weight: 600; color: var(--gold); letter-spacing: 0.05em; text-transform: uppercase; }
  .vars-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .var-row { display: flex; flex-direction: column; padding: 12px 24px; border-bottom: 1px solid #1a1a1a; border-right: 1px solid #1a1a1a; font-size: 13px; }
  .var-row:nth-child(even) { border-right: none; }
  .var-label { color: var(--grey); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .var-value { color: var(--white); font-weight: 500; }
  .var-value.empty { color: #3a3a3a; font-style: italic; }
  .generate-btn { width: 100%; padding: 18px; background: var(--gold); color: var(--black); border: none; border-radius: 10px; font-size: 16px; font-weight: 700; letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s, transform 0.1s; text-transform: uppercase; }
  .generate-btn:hover { background: #d4aa2a; }
  .generate-btn:active { transform: scale(0.99); }
  .generate-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .status { text-align: center; font-size: 14px; color: var(--grey); min-height: 20px; }
  .status.error { color: #e05555; }
  .status.success { color: #7bc47f; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { margin-top: auto; padding: 24px; font-size: 12px; color: #333; text-align: center; }
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="Shine on Stage">
  <div class="subtitle">Tech Rider Generator</div>
</header>

<main>
  <div class="hero">
    <h1>Generate your<br><span>Tech Rider</span></h1>
    <p>Upload your show data file. The rider is built and downloaded instantly.</p>
  </div>

  <div id="dropZone" class="drop-zone">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <span class="drop-icon">📂</span>
    <h2>Drop your show file here</h2>
    <p>or click to browse</p>
    <div class="formats">
      <span class="badge">XLSX</span>
    </div>
  </div>

  <div id="fileLoaded" class="file-loaded" style="display:none">
    <span class="file-icon">✅</span>
    <div class="file-info">
      <div class="file-name" id="fileName"></div>
      <div class="file-meta" id="fileMeta"></div>
    </div>
    <button class="clear-btn" id="clearBtn" title="Remove file">✕</button>
  </div>

  <div id="previewPanel" class="preview-panel" style="display:none">
    <div class="panel-header">
      <span class="panel-title">Show Settings</span>
    </div>
    <div class="vars-grid" id="varsGrid"></div>
    <div class="panel-header" style="border-top:1px solid #2a2a2a">
      <span class="panel-title">Running Order</span>
      <span class="act-count" id="actCount"></span>
    </div>
    <div class="act-list" id="actList"></div>
  </div>

  <button class="generate-btn" id="generateBtn" disabled>Generate Tech Rider</button>
  <div class="status" id="status"></div>
</main>

<footer>Born2Perform / Shine on Stage — Internal Tool</footer>

<script>
let parsedData = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
document.getElementById('clearBtn').addEventListener('click', clearFile);

function clearFile() {
  parsedData = null;
  fileInput.value = '';
  document.getElementById('dropZone').style.display = '';
  document.getElementById('fileLoaded').style.display = 'none';
  document.getElementById('previewPanel').style.display = 'none';
  document.getElementById('generateBtn').disabled = true;
  setStatus('');
}

function handleFile(file) {
  if (!file) return;
  setStatus('');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      parsedData = parseWorkbook(wb);
      showPreview(file, parsedData);
      document.getElementById('generateBtn').disabled = false;
    } catch(err) {
      setStatus('Could not read file: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseWorkbook(wb) {
  // Find sheets by name — Routines and Variables
  const findSheet = name => {
    const s = wb.SheetNames.find(n => n.toLowerCase().trim() === name.toLowerCase());
    return s ? wb.Sheets[s] : null;
  };

  const routinesSheet = findSheet('routines');
  const variablesSheet = findSheet('variables');

  if (!routinesSheet) throw new Error('Could not find a sheet named "Routines". Please check your file.');
  if (!variablesSheet) throw new Error('Could not find a sheet named "Variables". Please check your file.');

  // Parse Routines — header row is row 0
  const routinesRaw = XLSX.utils.sheet_to_json(routinesSheet, { header: 1, defval: '' });
  const headers = routinesRaw[0].map(c => String(c).trim());
  const routines = [];
  for (let i = 1; i < routinesRaw.length; i++) {
    const row = routinesRaw[i];
    if (row.every(c => c === '' || c === null || c === undefined)) continue;
    const obj = {};
    headers.forEach((h, j) => obj[h] = String(row[j] === null || row[j] === undefined ? '' : row[j]).trim());
    routines.push(obj);
  }

  // Parse Variables — two columns: Setting, Value
  const variablesRaw = XLSX.utils.sheet_to_json(variablesSheet, { header: 1, defval: '' });
  const variables = {};
  for (const row of variablesRaw) {
    if (row[0] && row[1] !== '' && row[1] !== null && row[1] !== undefined) {
      variables[String(row[0]).trim()] = String(row[1]).trim();
    }
  }

  return { routines, variables, headers };
}

// Column name map — exactly matching the sheet
const COL = {
  num:       '#',
  school:    'School',
  routine:   'Routine Name',
  song:      'Song',
  length:    'Length of Song',
  clock:     'Clock',
  performers:'No. Performers',
  props:     'Props',
  mics:      'Mics - How Many/Type',
  type:      'SInging or Dancing',  // matches exact sheet header incl capital I
  costume:   'Costume Colours'
};

// Variable key map — exactly matching the Variables sheet
const VAR = {
  showName:       'Show Name',
  date:           'Date',
  venue:          'Venue',
  venueAddress:   'Venue Address',
  emName:         'Events Manager Name',
  emPhone:        'Events Manager Phone',
  emEmail:        'Events Manager Email',
  showStart:      'Show Start',
  compereOpening: 'Compere Opening',
  betweenActs:    'Compere Between Acts',
  compereClosing: 'Compere Closing',
  intervalDur:    'Interval Duration',
  finaleDur:      'Finale Duration',
  introTrack:     'Intro Track',
  outroTrack:     'Outro Track',
  starCloth:      'Star Cloth Required'
};

function getV(variables, key) {
  return variables[VAR[key]] || '';
}

function showPreview(file, data) {
  document.getElementById('dropZone').style.display = 'none';
  document.getElementById('fileLoaded').style.display = 'flex';
  document.getElementById('previewPanel').style.display = 'block';
  document.getElementById('fileName').textContent = file.name;

  const v = key => getV(data.variables, key);

  const varsToShow = [
    ['Show Name', v('showName')],
    ['Date', v('date')],
    ['Venue', v('venue')],
    ['Show Start', v('showStart')],
    ['Compere Opening', v('compereOpening')],
    ['Between Acts', v('betweenActs')],
    ['Interval', v('intervalDur')],
    ['Star Cloth', v('starCloth')],
  ];
  document.getElementById('varsGrid').innerHTML = varsToShow.map(([k, val]) => `
    <div class="var-row">
      <div class="var-label">${k}</div>
      <div class="var-value ${val ? '' : 'empty'}">${val || 'not set'}</div>
    </div>`).join('');

  let acts = 0;
  document.getElementById('actList').innerHTML = data.routines.map(r => {
    const school = r[COL.school] || '';
    const routine = r[COL.routine] || '';
    const song = r[COL.song] || '';
    const length = r[COL.length] || '';
    const num = r[COL.num] || '';

    const isInterval = routine.toLowerCase().includes('interval') || school.toLowerCase().includes('interval');
    const isFinale = routine.toLowerCase().includes('finale') || school.toLowerCase().includes('finale');

    if (isInterval) return `<div class="separator-row">— Interval —</div>`;
    if (isFinale) return `<div class="separator-row">— Finale —</div>`;
    if (!school && !routine) return '';
    acts++;
    return `<div class="act-row">
      <div class="act-num">${num || acts}</div>
      <div class="act-school">${school}</div>
      <div class="act-routine">${routine}${song ? ' — ' + song : ''}</div>
      <div class="act-length">${length}</div>
    </div>`;
  }).join('');
  document.getElementById('actCount').textContent = `${acts} acts`;
  document.getElementById('fileMeta').textContent = `${acts} acts parsed`;
}

document.getElementById('generateBtn').addEventListener('click', async () => {
  if (!parsedData) return;
  setStatus('<span class="spinner"></span>Building your tech rider…');
  document.getElementById('generateBtn').disabled = true;
  try {
    await generateTechRider(parsedData);
    setStatus('✅ Tech rider downloaded successfully.', 'success');
  } catch(err) {
    setStatus('Error: ' + err.message, 'error');
    console.error(err);
  }
  document.getElementById('generateBtn').disabled = false;
});

function setStatus(html, type = '') {
  const el = document.getElementById('status');
  el.innerHTML = html;
  el.className = 'status' + (type ? ' ' + type : '');
}

// ── Clock time helpers ────────────────────────────────────────────────────────
function parseMins(str) {
  if (!str) return 0;
  str = String(str).trim();
  const parts = str.split(':').map(Number);
  if (parts.length === 3) return parts[0] * 60 + parts[1] + parts[2] / 60;
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return parseFloat(str) || 0;
}
function parseShowTime(str) {
  if (!str) return { h: 18, m: 0 };
  const parts = str.split(':').map(Number);
  return { h: parts[0] || 18, m: parts[1] || 0 };
}
function addMins(base, mins) {
  const total = base.h * 60 + base.m + mins;
  return { h: Math.floor(total / 60) % 24, m: Math.round(total % 60) };
}
function fmtTime(t) {
  return `${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`;
}

// ── Main doc generator ────────────────────────────────────────────────────────
async function generateTechRider(data) {
  if (!window.docx) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js');

  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, LevelFormat, BorderStyle, WidthType, ShadingType, VerticalAlign, HeadingLevel } = window.docx;

  const GOLD = "C9A227"; const OFF_WHITE = "F9F6F0"; const WHITE = "FFFFFF";
  const BLACK = "1A1A1A"; const LIGHT_GOLD = "F5E9C4";

  const v = key => getV(data.variables, key);

  // Timings
  const showStart       = parseShowTime(v('showStart'));
  const compereOpening  = parseMins(v('compereOpening'));
  const betweenActs     = parseMins(v('betweenActs'));
  const compereClosing  = parseMins(v('compereClosing'));
  const intervalDur     = parseMins(v('intervalDur'));
  const finaleDur       = parseMins(v('finaleDur'));

  // Walk routines and calculate clock times
  let clock = addMins(showStart, compereOpening);
  let intervalClock = null, intervalEndClock = null, finaleClock = null, finaleEndClock = null;
  const processed = [];

  for (const r of data.routines) {
    const school  = r[COL.school] || '';
    const routine = r[COL.routine] || '';
    const isInterval = routine.toLowerCase().includes('interval') || school.toLowerCase().includes('interval');
    const isFinale   = routine.toLowerCase().includes('finale')  || school.toLowerCase().includes('finale');
    if (!school && !routine) continue;

    if (isInterval) {
      intervalClock    = { ...clock };
      intervalEndClock = addMins(clock, intervalDur);
      clock = { ...intervalEndClock };
      processed.push({ kind: 'interval', clock: intervalClock, endClock: intervalEndClock });
      continue;
    }
    if (isFinale) {
      finaleClock   = addMins(clock, compereClosing);
      finaleEndClock = addMins(finaleClock, finaleDur);
      processed.push({ kind: 'finale', clock: finaleClock, endClock: finaleEndClock, length: r[COL.length] || '' });
      continue;
    }

    const actClock = { ...clock };
    const lenMins  = parseMins(r[COL.length]);
    clock = addMins(clock, lenMins + betweenActs);

    processed.push({
      kind: 'act',
      num:        r[COL.num],
      school,
      routine,
      song:       r[COL.song]        || '',
      length:     r[COL.length]      || '',
      performers: r[COL.performers]  || '',
      props:      r[COL.props]       || '',
      mics:       r[COL.mics]        || '',
      type:       r[COL.type]        || '',
      costume:    r[COL.costume]     || '',
      clock:      actClock
    });
  }

  const acts      = processed.filter(r => r.kind === 'act');
  const micActs   = acts.filter(r => r.mics && !['n/a','none',''].includes(r.mics.toLowerCase()));
  const propActs  = acts.filter(r => r.props && !['n/a','none',''].includes(r.props.toLowerCase()));

  // ── Style helpers ───────────────────────────────────────────────────────────
  const cb = { style: BorderStyle.SINGLE, size: 4, color: "D4B84A" };
  const hb = { style: BorderStyle.SINGLE, size: 6, color: GOLD };
  const cBorders = { top: cb, bottom: cb, left: cb, right: cb };
  const hBorders = { top: hb, bottom: hb, left: hb, right: hb };

  const goldDivider = () => new Paragraph({
    border: { bottom: { style: BorderStyle.SINGLE, size: 8, color: GOLD, space: 1 } },
    spacing: { before: 200, after: 200 }, children: []
  });
  const h1 = text => new Paragraph({ heading: HeadingLevel.HEADING_1, children: [new TextRun({ text, font: "Calibri", size: 28, bold: true, color: BLACK })] });
  const h2 = text => new Paragraph({ heading: HeadingLevel.HEADING_2, children: [new TextRun({ text, font: "Calibri", size: 24, bold: true, color: GOLD })] });
  const para = (text, opts = {}) => new Paragraph({ spacing: { before: 60, after: 60 }, children: [new TextRun({ text, font: "Calibri", size: 22, color: BLACK, ...opts })] });
  const callout = text => new Paragraph({
    border: { left: { style: BorderStyle.SINGLE, size: 12, color: GOLD, space: 6 } },
    spacing: { before: 100, after: 100 }, indent: { left: 360 },
    children: [new TextRun({ text, font: "Calibri", size: 22, color: "444444", italics: true })]
  });
  const blt = text => new Paragraph({
    numbering: { reference: "bullets", level: 0 }, spacing: { before: 40, after: 40 },
    children: [new TextRun({ text, font: "Calibri", size: 22, color: BLACK })]
  });
  const sp = () => new Paragraph({ spacing: { before: 80, after: 80 }, children: [] });

  const hdrRow = (cells, widths) => new TableRow({ tableHeader: true, children: cells.map((text, i) => new TableCell({
    borders: hBorders, width: { size: widths[i], type: WidthType.DXA },
    margins: { top: 80, bottom: 80, left: 120, right: 120 },
    shading: { fill: GOLD, type: ShadingType.CLEAR }, verticalAlign: VerticalAlign.CENTER,
    children: [new Paragraph({ children: [new TextRun({ text, font: "Calibri", size: 18, bold: true, color: WHITE })] })]
  }))});

  const dataRow = (cells, widths, shade) => new TableRow({ children: cells.map((text, i) => new TableCell({
    borders: cBorders, width: { size: widths[i], type: WidthType.DXA },
    margins: { top: 60, bottom: 60, left: 120, right: 120 },
    shading: { fill: shade ? OFF_WHITE : WHITE, type: ShadingType.CLEAR }, verticalAlign: VerticalAlign.CENTER,
    children: [new Paragraph({ children: [new TextRun({ text: text || '—', font: "Calibri", size: 18, color: BLACK })] })]
  }))});

  const spanRow = (text, totalWidth, cols) => new TableRow({ children: [new TableCell({
    borders: cBorders, width: { size: totalWidth, type: WidthType.DXA }, columnSpan: cols,
    shading: { fill: LIGHT_GOLD, type: ShadingType.CLEAR },
    margins: { top: 80, bottom: 80, left: 120, right: 120 },
    children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text, font: "Calibri", size: 20, bold: true, color: BLACK })] })]
  })]});

  // ── Tables ──────────────────────────────────────────────────────────────────

  // Running order
  const RO_W = [380, 1400, 1200, 1300, 620, 650, 900, 900, 700, 900, 700];
  const RO_TOTAL = RO_W.reduce((a,b) => a+b, 0);
  const RO_HDR = ["No.", "School", "Routine", "Song", "Length", "Performers", "Props", "Mics", "Type", "Costume", "Clock"];
  let roRows = [hdrRow(RO_HDR, RO_W)];
  let shade = false;
  for (const r of processed) {
    if (r.kind === 'interval') {
      roRows.push(spanRow(`— INTERVAL — ${intervalDur} mins — ${fmtTime(r.clock)} until ${fmtTime(r.endClock)} —`, RO_TOTAL, 11));
      shade = false;
    } else if (r.kind === 'finale') {
      roRows.push(spanRow(`— FINALE — approx. ${finaleDur} mins — Clock: ${fmtTime(r.clock)} — Est. end: ${fmtTime(r.endClock)} —`, RO_TOTAL, 11));
    } else {
      roRows.push(dataRow([r.num, r.school, r.routine, r.song, r.length, r.performers, r.props||'—', r.mics||'—', r.type, r.costume, fmtTime(r.clock)], RO_W, shade));
      shade = !shade;
    }
  }
  const roTable = new Table({ width: { size: RO_TOTAL, type: WidthType.DXA }, columnWidths: RO_W, rows: roRows });

  // Mic schedule
  const MIC_W = [380, 700, 1600, 1500, 1800, 2200];
  const MIC_TOTAL = MIC_W.reduce((a,b) => a+b, 0);
  const micTable = new Table({ width: { size: MIC_TOTAL, type: WidthType.DXA }, columnWidths: MIC_W, rows: [
    hdrRow(["No.", "Clock", "School / Act", "Routine", "Mic Requirement", "Notes"], MIC_W),
    ...micActs.map((r, i) => dataRow([r.num, fmtTime(r.clock), r.school, r.routine, r.mics, ''], MIC_W, i % 2 === 0))
  ]});

  // Props schedule
  const PROPS_W = [380, 700, 1600, 1500, 1800, 2200];
  const PROPS_TOTAL = PROPS_W.reduce((a,b) => a+b, 0);
  const propsTable = propActs.length ? new Table({ width: { size: PROPS_TOTAL, type: WidthType.DXA }, columnWidths: PROPS_W, rows: [
    hdrRow(["No.", "Clock", "School / Act", "Routine", "Props", "Notes"], PROPS_W),
    ...propActs.map((r, i) => dataRow([r.num, fmtTime(r.clock), r.school, r.routine, r.props, ''], PROPS_W, i % 2 === 0))
  ]}) : null;

  // Overview timing
  const OV_W = [3200, 4800];
  const OV_TOTAL = OV_W.reduce((a,b) => a+b, 0);
  const ovRows = [
    hdrRow(["", ""], OV_W), // hidden header
    dataRow(["Show Start", fmtTime(showStart)], OV_W, true),
    dataRow(["First Act", acts[0] ? `${fmtTime(acts[0].clock)} (after ${compereOpening}-min compere opening)` : '—'], OV_W, false),
    intervalClock    ? dataRow(["Interval Begins", `${fmtTime(intervalClock)} — ${intervalDur} minutes`], OV_W, true) : null,
    intervalEndClock ? dataRow(["Second Half Begins", fmtTime(intervalEndClock)], OV_W, false) : null,
    finaleClock      ? dataRow(["Finale", fmtTime(finaleClock)], OV_W, true) : null,
    finaleEndClock   ? dataRow(["Estimated End", fmtTime(finaleEndClock)], OV_W, false) : null,
  ].filter(Boolean);
  const ovTable = new Table({ width: { size: OV_TOTAL, type: WidthType.DXA }, columnWidths: OV_W, rows: ovRows });

  // Contacts
  const CON_W = [2000, 2200, 2200, 2600];
  const CON_TOTAL = CON_W.reduce((a,b) => a+b, 0);
  const contactsTable = new Table({ width: { size: CON_TOTAL, type: WidthType.DXA }, columnWidths: CON_W, rows: [
    hdrRow(["Role", "Name", "Phone", "Email"], CON_W),
    dataRow(["Events Manager", v('emName'), v('emPhone'), v('emEmail')], CON_W, true),
    dataRow(["Venue Contact", '[TBC]', '[TBC]', '[TBC]'], CON_W, false),
  ]});

  const showName = v('showName') || 'Shine on Stage';
  const starCloth = v('starCloth');
  const hasStarCloth = starCloth && starCloth.toLowerCase() !== 'no';

  // ── Build document ──────────────────────────────────────────────────────────
  const children = [
    // Cover
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 200, after: 80 }, children: [new TextRun({ text: showName.toUpperCase(), font: "Calibri", size: 52, bold: true, color: GOLD })] }),
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 0, after: 80 },   children: [new TextRun({ text: "TECH RIDER", font: "Calibri", size: 32, bold: true, color: BLACK })] }),
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 0, after: 80 },   children: [new TextRun({ text: `${v('date')} | ${v('venue')}`, font: "Calibri", size: 24, color: "555555", italics: true })] }),
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 0, after: 80 },   children: [new TextRun({ text: `${v('venueAddress')}`, font: "Calibri", size: 22, color: "555555", italics: true })] }),
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 0, after: 80 },   children: [new TextRun({ text: `Show Start: ${fmtTime(showStart)} | Est. End: ${finaleEndClock ? fmtTime(finaleEndClock) : 'TBC'}`, font: "Calibri", size: 22, color: "555555", italics: true })] }),
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 0, after: 80 },   children: [new TextRun({ text: `Produced by Born2Perform / Shine on Stage | ${v('emName')} | ${v('emEmail')}`, font: "Calibri", size: 20, color: "555555", italics: true })] }),

    goldDivider(),

    // Show Overview
    h1("Show Overview"),
    para(`${acts.length} acts across two halves with a ${intervalDur}-minute interval. All acts use pre-recorded backing tracks — no live band.`),
    sp(), ovTable, sp(),

    goldDivider(),

    // Production Notes
    h1("Production Notes"),

    ...(hasStarCloth ? [
      h2("Star Cloth"),
      para("We request use of the venue's star cloth as a backdrop for the show, if one is available."),
    ] : []),

    h2("Pre-Show — QR Code Banner"),
    para("A QR code pop-up banner displaying the online show programme will be stationed at the front of the stage from when the house opens. Please train a tight spotlight on this banner and hold it until the banner is removed immediately before the show begins, to allow the audience to scan the QR code and access the programme on their devices."),

    h2("Intro Sequence"),
    para("Curtains closed. Intro track played (royalty-free instrumental — supplied on the day). Voice of God mic live — compere delivers the opening announcement. Compere then walks out to introduce the show."),

    h2("Curtain Protocol"),
    blt("Curtains closed at the start of the show"),
    blt("During changeovers between acts: house lights dim, but sufficient low-level stage lighting must remain so that performers can move safely in the wings and onto the stage"),
    blt("Curtains down again at interval"),
    blt("Curtains are not used between individual acts — all changeovers are performer entry/exit only"),

    h2("Stairs"),
    para("Stage-to-floor access stairs (or equivalent) must be in place for the rehearsal period. They should be removed before the show begins and kept clear of the stage front for the duration of the performance."),

    h2("Outro"),
    para("At the close of the show, please play the outro track (same royalty-free instrumental as the intro — supplied on the day) as backdrop music while the audience exits."),

    goldDivider(),

    // Audio
    h1("Audio Requirements"),

    h2("Backing Tracks"),
    para("All acts use pre-recorded backing tracks supplied by the production team on the day."),
    blt("Confirm required format in advance (USB / laptop / aux)"),
    blt("Tracks are cued individually per act — no continuous mix"),
    blt("Operator to hold between acts and start on stage manager cue"),
    sp(),

    h2("Microphone Schedule"),
    ...(micActs.length > 0 ? [
      callout(micActs.some(r => r.mics.toLowerCase().includes('radio') && r.mics.toLowerCase().includes('handheld'))
        ? "⚠  At least one act requires both radio mics and a handheld mic simultaneously. Please flag any channel limitations in advance."
        : "Microphone requirements apply to the acts listed below only. All other acts are dance-only with no mic requirement."),
      sp(), micTable
    ] : [para("No microphone requirements for this show.")]),
    sp(),

    goldDivider(),

    ...(propsTable ? [
      h1("Props Schedule"),
      para("The following acts have props. All props are brought by the performing schools."),
      sp(), propsTable, sp(),
      callout("Please liaise with the production team on the day regarding exact prop placement."),
      goldDivider(),
    ] : []),

    // Lighting
    h1("Lighting Notes"),
    blt("General wash for all dance acts — warm and cool capability preferred"),
    blt("Follow spot or tight wash desirable for solo singing acts (see Type column in running order)"),
    blt("Interval: house lights to full"),
    blt("Finale: bright full-stage wash — high energy"),
    callout("Individual schools have not submitted specific LX briefs. Costume colours are listed in the running order and can be used as a reference for colour washes if desired."),

    goldDivider(),

    // Get-in
    h1("Get-In & Schedule"),
    blt("Get-in time: TBC — please confirm with venue"),
    blt("Sound check / line check: TBC"),
    blt("Compere briefing with stage manager: minimum 30 minutes before doors open"),
    blt("All schools to be briefed by the production team on backstage flow and changeover expectations prior to the day"),
    callout("Changeover time between acts is factored into the running order. All changeovers are performer entry/exit only — no set or prop changes except where listed in the Props Schedule above."),

    goldDivider(),

    // Running order
    h1("Full Running Order"),
    callout("Clock times are calculated from show start and are approximate. Compere opening: " + compereOpening + " mins. Between acts: " + betweenActs + " mins. Compere closing: " + compereClosing + " mins."),
    sp(), roTable, sp(),

    goldDivider(),

    // Contacts
    h1("Key Contacts"),
    sp(), contactsTable, sp(),
    callout(`Document generated: ${new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}. Please confirm receipt and flag any questions as early as possible.`),
  ];

  const doc = new Document({
    numbering: { config: [{ reference: "bullets", levels: [{ level: 0, format: LevelFormat.BULLET, text: "-", alignment: AlignmentType.LEFT, style: { paragraph: { indent: { left: 720, hanging: 360 } } } }] }] },
    styles: {
      default: { document: { run: { font: "Calibri", size: 22 } } },
      paragraphStyles: [
        { id: "Heading1", name: "Heading 1", basedOn: "Normal", next: "Normal", quickFormat: true, run: { size: 32, bold: true, font: "Calibri", color: BLACK }, paragraph: { spacing: { before: 320, after: 160 } } },
        { id: "Heading2", name: "Heading 2", basedOn: "Normal", next: "Normal", quickFormat: true, run: { size: 26, bold: true, font: "Calibri", color: GOLD }, paragraph: { spacing: { before: 240, after: 120 } } }
      ]
    },
    sections: [{ properties: { page: { size: { width: 16838, height: 11906, orientation: "landscape" }, margin: { top: 1000, right: 1000, bottom: 1000, left: 1000 } } }, children }]
  });

  const buffer = await Packer.toBuffer(doc);
  const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(v('showName') || 'SOS').replace(/[^a-zA-Z0-9]/g, '_')}_Tech_Rider.docx`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) return resolve();
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}
</script>
</body>
</html>
